<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f5f7f4">
  <meta name="description" content="Painel comercial da Unctus Acabamentos">
  <title>Painel Comercial | Unctus</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div class="brand-block">
        <span class="brand-kicker">UNCTUS ACABAMENTOS</span>
        <h1>Painel Comercial</h1>
        <p>Acompanhamento da equipe em tempo real</p>
      </div>

      <div class="header-actions">
        <div class="update-pill" aria-live="polite">
          <span class="status-dot"></span>
          <span id="lastUpdate">Carregando dados</span>
        </div>

        <button id="refreshButton" class="icon-button" type="button" aria-label="Atualizar dados" title="Atualizar dados">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M20 11a8 8 0 1 0 2.3 5.7M20 4v7h-7"/>
          </svg>
        </button>
      </div>
    </header>

    <main>
      <section class="summary-grid" aria-label="Resumo da equipe">
        <article class="summary-card">
          <div>
            <span class="summary-label">Orçamentos realizados</span>
            <strong id="summaryOrcReal">0</strong>
          </div>
          <span id="summaryOrcMeta" class="summary-meta">Meta 0</span>
        </article>

        <article class="summary-card">
          <div>
            <span class="summary-label">Vendas realizadas</span>
            <strong id="summaryFechReal">0</strong>
          </div>
          <span id="summaryFechMeta" class="summary-meta">Meta 0</span>
        </article>

        <article class="summary-card">
          <div>
            <span class="summary-label">Aproveitamento médio</span>
            <strong id="summaryAverage">0%</strong>
          </div>
          <span class="summary-meta">Equipe</span>
        </article>
      </section>

      <section class="section-heading">
        <div>
          <span class="section-kicker">DESEMPENHO INDIVIDUAL</span>
          <h2>Resultado por consultor</h2>
        </div>
      </section>

      <section id="consultantsGrid" class="consultants-grid" aria-live="polite"></section>
    </main>

    <footer class="app-footer">
      <span>Dados atualizados automaticamente pelo Google Sheets</span>
      <span id="connectionStatus">Conectando</span>
    </footer>
  </div>

  <template id="consultantTemplate">
    <article class="consultant-card">
      <div class="consultant-top">
        <div class="person">
          <div class="avatar"></div>
          <div>
            <h3 class="consultant-name"></h3>
            <span class="consultant-position">Consultor comercial</span>
          </div>
        </div>

        <div class="performance-badge">
          <strong class="performance-value">0%</strong>
          <span>desempenho</span>
        </div>
      </div>

      <div class="metrics-list">
        <div class="metric">
          <div class="metric-header">
            <span>Prospecção</span>
            <strong class="metric-prosp-value">0 de 0</strong>
          </div>
          <div class="progress-track">
            <div class="progress-bar metric-prosp-bar"></div>
          </div>
        </div>

        <div class="metric">
          <div class="metric-header">
            <span>Follow-up</span>
            <strong class="metric-follow-value">0 de 0</strong>
          </div>
          <div class="progress-track">
            <div class="progress-bar metric-follow-bar"></div>
          </div>
        </div>

        <div class="metric">
          <div class="metric-header">
            <span>Anúncios e leads</span>
            <strong class="metric-leads-value">0 de 0</strong>
          </div>
          <div class="progress-track">
            <div class="progress-bar metric-leads-bar"></div>
          </div>
        </div>
      </div>

      <div class="consultant-footer">
        <span class="status-text">Em andamento</span>
        <span class="ranking-position"></span>
      </div>
    </article>
  </template>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
